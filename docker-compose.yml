services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: trading_scanner
      POSTGRES_USER: trading_scanner
      POSTGRES_PASSWORD: trading_scanner_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading_scanner -d trading_scanner"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.docker.example
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - backend_yf_cache:/app/.yf_cache
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
    env_file:
      - ./frontend/.env.docker.example
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  backend_yf_cache:
